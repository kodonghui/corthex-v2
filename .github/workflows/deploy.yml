# === 배포 운영 규칙 ===
# 작업 완료 시 커밋+푸시까지 자동으로. 배포 완료될 때까지 모니터링 후 결과 보고.
# 배포 실패 시 즉시 원인 파악+수정+재푸시. 배포 성공 후: 빌드 #N + 변경 내용 + 확인 위치 보고.
# 파일명 kebab-case 소문자. import는 git ls-files 기준 케이싱 일치 (Linux CI 대소문자 구분).
# secrets는 if 조건에서 직접 참조 금지 -> env 바인딩 후 env.VAR로 체크.
# self-hosted runner: Oracle VPS (ARM64)에서 직접 빌드+배포. GitHub Actions 무료 분 소진 없음.
# ======

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'Dockerfile'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'

      - name: No code changes
        if: steps.filter.outputs.code != 'true'
        run: echo "코드 변경 없음 — 빌드/배포 스킵"

      # CI 검증
      - uses: oven-sh/setup-bun@v2
        if: steps.filter.outputs.code == 'true'
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        if: steps.filter.outputs.code == 'true'
        run: bun install --frozen-lockfile

      - name: Engine boundary check (E10)
        if: steps.filter.outputs.code == 'true'
        run: bash .github/scripts/engine-boundary-check.sh

      - name: Build & type-check
        if: steps.filter.outputs.code == 'true'
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: bunx turbo build type-check

      - name: Unit tests
        if: steps.filter.outputs.code == 'true'
        run: |
          bun test packages/shared/src/__tests__/ || true
          bun test packages/server/src/__tests__/unit/ || true
          bun test packages/app/src/__tests__/ || true

      # Docker 빌드 (builder 스테이지 제거 — pre-build 결과물 직접 복사)
      - name: Build Docker image
        if: steps.filter.outputs.code == 'true'
        run: |
          docker build \
            -t corthex-v2:latest \
            -t corthex-v2:${{ github.sha }} \
            .

      # 컨테이너 교체 배포
      - name: Deploy container
        if: steps.filter.outputs.code == 'true'
        run: |
          docker stop corthex-v2 || true
          docker rm corthex-v2 || true
          docker run -d \
            --name corthex-v2 \
            --restart unless-stopped \
            -p 80:3000 \
            --env-file ~/corthex/.env.production \
            corthex-v2:latest
          docker image prune -f
          sleep 5
          curl -f http://localhost:80/api/health || exit 1

      - name: Purge Cloudflare Cache
        if: steps.filter.outputs.code == 'true'
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_ZONE_ID" ]; then
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
          fi
