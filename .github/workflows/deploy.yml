name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. CI 검증
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Build all packages
        run: bunx turbo build
      - name: Type check
        run: bunx turbo type-check
      - name: Unit tests
        run: |
          bun test packages/shared/src/__tests__/ || true
          bun test packages/server/src/__tests__/unit/ || true
          bun test packages/app/src/__tests__/ || true

  # 2. Docker 이미지 빌드 → GHCR 푸시
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            GITHUB_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # 3. VPS 배포
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Nginx 비활성화 (Docker가 직접 80 포트 서빙)
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true

            # 최신 이미지 풀
            docker pull ghcr.io/${{ github.repository }}:latest

            # 기존 컨테이너 중지 및 제거
            docker stop corthex-v2 || true
            docker rm corthex-v2 || true

            # 새 컨테이너 실행 (포트 80 직접 노출)
            docker run -d \
              --name corthex-v2 \
              --restart unless-stopped \
              -p 80:3000 \
              --env-file ~/corthex/.env.production \
              ghcr.io/${{ github.repository }}:latest

            # 오래된 이미지 정리
            docker image prune -f

            # 헬스 체크
            sleep 5
            curl -f http://localhost:80/api/health || exit 1

      - name: Purge Cloudflare Cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        if: env.CF_ZONE_ID != ''
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'
