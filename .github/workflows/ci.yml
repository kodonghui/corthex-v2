name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Security audit (NFR-S14)
        run: |
          AUDIT=$(bun audit 2>&1 || true)
          echo "$AUDIT"
          FILTERED=$(echo "$AUDIT" | grep -vFf <(grep -v '^#\|^$' .github/audit-allowlist.txt) || true)
          HITS=$(echo "$FILTERED" | grep -E '^\s*(critical|high):' || true)
          if [ -n "$HITS" ]; then
            echo "$HITS" | while read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Build all packages
        run: bunx turbo build

      - name: Type check
        run: bunx turbo type-check

      - name: Unit tests
        run: |
          bun test packages/shared/src/__tests__/ || true
          bun test packages/server/src/__tests__/unit/ || true
          bun test packages/app/src/__tests__/ || true
