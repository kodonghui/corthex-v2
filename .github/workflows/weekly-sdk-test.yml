# Weekly SDK Integration Test (Architecture S8, Story 12.2)
# 매주 월요일 03:00 UTC에 실제 SDK query()를 호출하여 호환성 확인
# 비용: ~$1/회. 수동 실행도 가능 (workflow_dispatch)

name: Weekly SDK Integration Test

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC
  workflow_dispatch: {}

jobs:
  sdk-test:
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.CORTHEX_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Verify API key is configured
        env:
          HAS_KEY: ${{ secrets.CORTHEX_CLI_TOKEN != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::CORTHEX_CLI_TOKEN secret is not configured. SDK tests cannot run."
            exit 1
          fi
      - name: Install dependencies
        run: bun install
      - name: Run real SDK integration tests
        run: bun test packages/server/src/__tests__/sdk/
