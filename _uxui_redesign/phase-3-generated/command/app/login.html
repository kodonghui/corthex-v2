<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            'corthex-bg': '#0C0A09',
            'corthex-surface': '#1C1917',
            'corthex-elevated': '#292524',
            'corthex-border': '#44403C',
            'corthex-border-strong': '#57534E',
            'corthex-accent': '#CA8A04',
            'corthex-accent-hover': '#D97706',
            'corthex-text-primary': '#FAFAF9',
            'corthex-text-secondary': '#A8A29E',
            'corthex-text-disabled': '#57534E'
          },
          fontFamily: {
            "headline": ["DM Sans", "sans-serif"],
            "body": ["DM Sans", "sans-serif"],
            "label": ["DM Sans", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0C0A09;
      font-family: 'DM Sans', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-corthex-bg text-corthex-text-primary min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Subtle Background Texture -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle at 2px 2px, #44403C 1px, transparent 0); background-size: 40px 40px;">
</div>
<main class="w-full max-w-md z-10">
<!-- Header/Logo Area -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 mb-4 flex items-center justify-center relative">
<!-- Hexagon Decorative Shape -->
<svg class="absolute inset-0 w-full h-full text-corthex-accent fill-none stroke-[6px]" stroke="currentColor" viewbox="0 0 100 100">
<path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z"></path>
</svg>
<span class="material-symbols-outlined text-corthex-accent text-3xl" style="font-variation-settings: 'FILL' 1;">
          hexagon
        </span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-corthex-text-primary">CORTHEX</h1>
<p class="font-mono text-[10px] uppercase tracking-widest text-corthex-text-secondary mt-1">AI Virtual Office Management</p>
</div>
<!-- Login Card -->
<div class="bg-corthex-surface border border-corthex-border rounded-xl p-8 shadow-2xl">
<div class="mb-6">
<h2 class="text-xl font-semibold text-corthex-text-primary">Command Access</h2>
<p class="text-corthex-text-secondary text-sm mt-1">Enter your credentials to access the terminal.</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-corthex-text-primary" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-corthex-text-disabled text-lg group-focus-within:text-corthex-accent transition-colors">alternate_email</span>
</div>
<input class="block w-full pl-10 pr-4 py-2.5 bg-corthex-elevated border border-corthex-border rounded-lg text-corthex-text-primary placeholder:text-corthex-text-disabled focus:outline-none focus:border-corthex-accent focus:ring-1 focus:ring-corthex-accent transition-all duration-200" id="email" name="email" placeholder="operator@corthex.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-corthex-text-primary" for="password">Password</label>
<a class="text-xs font-medium text-corthex-accent hover:text-corthex-accent-hover transition-colors" href="#">Forgot key?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-corthex-text-disabled text-lg group-focus-within:text-corthex-accent transition-colors">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-corthex-elevated border border-corthex-border rounded-lg text-corthex-text-primary placeholder:text-corthex-text-disabled focus:outline-none focus:border-corthex-accent focus:ring-1 focus:ring-corthex-accent transition-all duration-200" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-corthex-text-disabled hover:text-corthex-text-secondary" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded bg-corthex-elevated border-corthex-border text-corthex-accent focus:ring-corthex-accent focus:ring-offset-corthex-bg transition-colors" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-corthex-text-secondary select-none" for="remember-me">
            Keep session persistent
          </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 bg-corthex-accent hover:bg-corthex-accent-hover text-corthex-bg font-bold rounded-lg transition-all duration-200 active:scale-[0.98] group" type="submit">
<span>INITIALIZE COMMAND</span>
<span class="material-symbols-outlined ml-2 text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Bottom Actions -->
<div class="mt-8 pt-6 border-t border-corthex-border flex flex-col items-center gap-4">
<p class="text-sm text-corthex-text-secondary">
          Unauthorized access is monitored. 
          <a class="text-corthex-accent font-medium ml-1" href="#">Request access</a>
</p>
</div>
</div>
</main>
<!-- Footer Component from JSON Mapping -->
<footer class="fixed bottom-0 w-full py-6 flex flex-col items-center justify-center gap-2 px-4 z-50">
<div class="flex gap-6 mb-1">
<a class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest text-[#57534E] hover:text-[#FAFAF9] transition-colors" href="#">Privacy Policy</a>
<a class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest text-[#57534E] hover:text-[#FAFAF9] transition-colors" href="#">Terms of Service</a>
<a class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest text-[#57534E] hover:text-[#FAFAF9] transition-colors" href="#">Support</a>
</div>
<p class="font-['JetBrains_Mono'] text-[10px] uppercase tracking-widest text-[#A8A29E]">
      © 2024 CORTHEX. AI Virtual Office Management Platform.
    </p>
</footer>
<!-- Background Decorative Image for mood -->
<div class="fixed bottom-[-10%] right-[-10%] w-[60%] h-[60%] opacity-10 pointer-events-none blur-3xl rounded-full bg-corthex-accent"></div>
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] opacity-5 pointer-events-none blur-3xl rounded-full bg-blue-600"></div>
</body></html>
