<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX | Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'bg-main': '#0C0A09',
                        'surface': '#1C1917',
                        'elevated': '#292524',
                        'border-dim': '#44403C',
                        'border-strong': '#57534E',
                        'accent': '#CA8A04',
                        'accent-hover': '#D97706',
                        'text-primary': '#FAFAF9',
                        'text-secondary': '#A8A29E',
                        'text-disabled': '#57534E'
                    },
                    fontFamily: {
                        "headline": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #0C0A09;
            color: #FAFAF9;
            font-family: 'DM Sans', sans-serif;
        }
        .step-active {
            color: #CA8A04;
            border-bottom: 2px solid #CA8A04;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center selection:bg-accent/30">
<!-- TopNavBar (Shared Component Logic) -->
<header class="fixed top-0 w-full z-50 bg-[#1C1917]/90 backdrop-blur-md border-b border-[#44403C] flex justify-between items-center h-14 px-4 w-full">
<div class="flex items-center gap-3">
<span class="text-lg font-bold text-[#FAFAF9] tracking-tight">CORTHEX</span>
</div>
<nav class="hidden md:flex items-center gap-6">
<span class="font-['DM_Sans'] text-sm font-medium tracking-tight text-[#FAFAF9] font-bold">Onboarding</span>
</nav>
<div class="flex items-center gap-4">
<button class="text-[#A8A29E] hover:text-[#FAFAF9] transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-2xl px-6 pt-32 pb-20 flex flex-col">
<!-- Step Indicator & Progress -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<div>
<span class="text-[10px] uppercase tracking-widest font-bold text-accent font-mono">Mission Initialization</span>
<h1 class="text-2xl font-bold text-text-primary mt-1">Configure Environment</h1>
</div>
<div class="text-right">
<span class="text-xs font-mono text-text-secondary">Step</span>
<span class="text-xl font-mono font-bold text-text-primary ml-1">1 / 4</span>
</div>
</div>
<div class="h-1 w-full bg-border-dim rounded-full overflow-hidden">
<div class="h-full bg-accent w-1/4 shadow-[0_0_8px_rgba(202,138,4,0.4)]"></div>
</div>
</div>
<!-- Onboarding Form -->
<div class="space-y-10">
<!-- Company Name Field -->
<section class="group">
<label class="block text-sm font-medium text-text-primary mb-2 transition-colors group-focus-within:text-accent" for="company_name">
                    Company Name
                </label>
<div class="relative">
<input class="w-full bg-elevated border border-border-dim rounded-lg px-4 py-3 text-text-primary placeholder:text-text-disabled focus:ring-1 focus:ring-accent focus:border-accent transition-all outline-none" id="company_name" name="company_name" placeholder="e.g. Acme Corp" type="text"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-text-disabled opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="corporate_fare">corporate_fare</span>
</div>
</div>
<p class="mt-2 text-xs text-text-secondary">Official entity name for workspace identification.</p>
</section>
<!-- Industry Selector -->
<section class="group">
<label class="block text-sm font-medium text-text-primary mb-2 transition-colors group-focus-within:text-accent" for="industry">
                    Industry
                </label>
<div class="relative">
<select class="w-full bg-elevated border border-border-dim rounded-lg px-4 py-3 text-text-primary appearance-none focus:ring-1 focus:ring-accent focus:border-accent transition-all outline-none cursor-pointer" id="industry" name="industry">
<option disabled="" selected="" value="">Select industry vertical</option>
<option value="tech">Technology</option>
<option value="healthcare">Healthcare</option>
<option value="finance">Finance</option>
<option value="creative">Creative Services</option>
<option value="manufacturing">Manufacturing</option>
<option value="other">Other</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</section>
<!-- Team Size Selector (High-End Card Pattern) -->
<section>
<label class="block text-sm font-medium text-text-primary mb-4">
                    Team Size
                </label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<!-- Option 1 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="team_size" type="radio" value="1-10"/>
<div class="flex flex-col items-center justify-center p-4 bg-surface border border-border-dim rounded-lg transition-all hover:border-border-strong peer-checked:border-accent peer-checked:bg-accent/10">
<span class="font-mono text-sm text-text-primary">1-10</span>
<span class="text-[10px] text-text-secondary uppercase mt-1">Core</span>
</div>
</label>
<!-- Option 2 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="team_size" type="radio" value="11-50"/>
<div class="flex flex-col items-center justify-center p-4 bg-surface border border-border-dim rounded-lg transition-all hover:border-border-strong peer-checked:border-accent peer-checked:bg-accent/10">
<span class="font-mono text-sm text-text-primary">11-50</span>
<span class="text-[10px] text-text-secondary uppercase mt-1">Startup</span>
</div>
</label>
<!-- Option 3 -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="team_size" type="radio" value="51-200"/>
<div class="flex flex-col items-center justify-center p-4 bg-surface border border-accent border-accent/40 rounded-lg transition-all hover:border-border-strong peer-checked:border-accent peer-checked:bg-accent/10">
<span class="font-mono text-sm text-text-primary">51-200</span>
<span class="text-[10px] text-text-secondary uppercase mt-1">Growth</span>
</div>
</label>
<!-- Option 4 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="team_size" type="radio" value="200+"/>
<div class="flex flex-col items-center justify-center p-4 bg-surface border border-border-dim rounded-lg transition-all hover:border-border-strong peer-checked:border-accent peer-checked:bg-accent/10">
<span class="font-mono text-sm text-text-primary">200+</span>
<span class="text-[10px] text-text-secondary uppercase mt-1">Enterprise</span>
</div>
</label>
</div>
</section>
</div>
<!-- Form Navigation -->
<div class="mt-16 flex items-center justify-between pt-8 border-t border-border-dim/30">
<button class="px-6 py-2.5 rounded-lg text-text-secondary font-medium hover:text-text-primary hover:bg-elevated transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                Back
            </button>
<button class="bg-accent hover:bg-accent-hover text-bg-main font-bold px-8 py-3 rounded-lg flex items-center gap-2 transition-all active:scale-[0.98] shadow-[0_4px_20px_rgba(202,138,4,0.15)] group">
                NEXT
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Decorative UI Element (Asymmetric Detail) -->
<div class="mt-20 self-start opacity-20 pointer-events-none">
<div class="text-[10px] font-mono text-text-disabled leading-tight">
                SYSTEM_ONBOARDING_LOG_V2.4<br/>
                ENCRYPTED_HANDSHAKE: SUCCESS<br/>
                USER_ID: CTX-7701-B<br/>
                STABILITY: NOMINAL
            </div>
</div>
</main>
<!-- Background Decorative Image -->
<div class="fixed bottom-0 right-0 -z-10 w-1/3 h-1/2 opacity-10">
<div class="w-full h-full bg-no-repeat bg-right-bottom bg-contain" data-alt="large geometric hexagon pattern in subtle dark gray wireframe style against a black background for a high-tech corporate aesthetic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDDrhXcyuJcFE-gQ5NMwzx03I_1EyzhuXlQo-MnhGLdm_3jHD05nU12haABn_f9JDlAt8E7RFf7uq7hLyxZnoJETSRCYxxx-hkVUhBJf6fK5iZLiB6Z9kB2JLjtJm4ER-_es9tdKyTtDBdURxw9yJL25ipJVxvb52OMt2CAwaUsZ8vo9TizdOlrPZEvAIawSMZpWaG_FxwXv9_mBWlrQCz5aI9WAeFeX_irhxtp3Z4loPQ8WWVg8RZi8DsVIJ-VnhL3-WE2WjZLtO8')">
</div>
</div>
</body></html>
