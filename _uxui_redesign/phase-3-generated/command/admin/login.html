<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@800&amp;family=DM+Sans:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#151312",
                        "primary": "#ffba46",
                        "on-tertiary": "#003353",
                        "tertiary-fixed-dim": "#96ccff",
                        "on-tertiary-container": "#003251",
                        "outline": "#9e8e7b",
                        "secondary-fixed-dim": "#e7c089",
                        "on-tertiary-fixed-variant": "#004a76",
                        "on-secondary": "#432c02",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#614000",
                        "on-background": "#e8e1df",
                        "surface-container": "#221f1e",
                        "error-container": "#93000a",
                        "tertiary": "#96ccff",
                        "on-primary-fixed": "#281800",
                        "surface-dim": "#151312",
                        "on-error": "#690005",
                        "on-secondary-container": "#d5af79",
                        "inverse-on-surface": "#33302e",
                        "inverse-surface": "#e8e1df",
                        "secondary-container": "#5d4216",
                        "surface-container-lowest": "#100e0d",
                        "primary-container": "#ca8a04",
                        "on-primary": "#442c00",
                        "surface-tint": "#ffba46",
                        "on-primary-container": "#422a00",
                        "surface-container-high": "#2c2928",
                        "outline-variant": "#514535",
                        "secondary-fixed": "#ffddb0",
                        "surface-bright": "#3c3837",
                        "surface-container-highest": "#373433",
                        "on-surface": "#e8e1df",
                        "tertiary-container": "#3f9de4",
                        "secondary": "#e7c089",
                        "primary-fixed": "#ffddb0",
                        "tertiary-fixed": "#cee5ff",
                        "on-tertiary-fixed": "#001d32",
                        "surface": "#151312",
                        "primary-fixed-dim": "#ffba46",
                        "on-secondary-fixed-variant": "#5d4216",
                        "on-surface-variant": "#d5c4ae",
                        "on-secondary-fixed": "#281800",
                        "surface-variant": "#373433",
                        "surface-container-low": "#1d1b1a",
                        "inverse-primary": "#805600",
                        "on-error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "brand": ["DM Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vault-gradient {
            background: linear-gradient(135deg, #ffba46 0%, #ca8a04 100%);
        }
        .milled-surface {
            background-color: #100e0d;
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.5);
        }
        .ghost-focus:focus-within {
            background-color: #2c2928;
            outline: 1px solid rgba(158, 142, 123, 0.2);
        }
        .pulse-accent {
            height: 2px;
            width: 0;
            transition: width 0.4s ease-in-out;
            background-color: #ffba46;
        }
        .ghost-focus:focus-within .pulse-accent {
            width: 100%;
        }
    </style>
</head>
<body class="bg-[#0C0A09] text-on-surface font-body min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Watermark Decoration -->
<div class="absolute inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none select-none">
<h1 class="text-[25vw] font-brand font-bold tracking-tighter">CORTHEX</h1>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="bg-surface-container-low p-10 rounded-xl flex flex-col items-center">
<!-- Logo & Identity -->
<header class="mb-12 text-center">
<div class="flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="text-3xl font-brand font-bold tracking-tight text-primary">CORTHEX ADMIN</h1>
<p class="text-on-surface-variant font-label text-xs uppercase tracking-[0.2em] mt-2">Sovereign Authority Terminal</p>
</header>
<!-- Authentication Form -->
<form class="w-full space-y-8">
<!-- Email Input Group -->
<div class="space-y-2 group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">
                        Credential Identifier
                    </label>
<div class="milled-surface rounded-lg overflow-hidden ghost-focus transition-all duration-400">
<div class="flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline-variant text-xl mr-3">alternate_email</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-surface-bright font-brand tracking-tight text-sm" id="email" name="email" placeholder="ADMIN@CORTHEX.SECURE" required="" type="email"/>
</div>
<div class="pulse-accent"></div>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2 group">
<div class="flex justify-between items-center ml-1">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="password">
                            Security Key
                        </label>
<a class="text-[9px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Recover Access</a>
</div>
<div class="milled-surface rounded-lg overflow-hidden ghost-focus transition-all duration-400">
<div class="flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline-variant text-xl mr-3">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-surface-bright font-brand tracking-tight text-sm" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
<div class="pulse-accent"></div>
</div>
</div>
<!-- Submit Action -->
<button class="vault-gradient w-full py-4 rounded-lg flex items-center justify-center group active:scale-95 transition-all duration-400 ease-in-out" type="submit">
<span class="text-on-primary-container font-brand font-bold text-sm tracking-widest uppercase mr-2">Login</span>
<span class="material-symbols-outlined text-on-primary-container group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Metadata Footer -->
<footer class="mt-12 pt-8 border-t border-surface-container-highest w-full text-center">
<div class="flex justify-center space-x-6 mb-4">
<div class="flex items-center text-[10px] text-on-surface-variant uppercase tracking-tighter">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-2"></span>
                        Nodes Online
                    </div>
<div class="flex items-center text-[10px] text-on-surface-variant uppercase tracking-tighter">
<span class="w-1.5 h-1.5 rounded-full bg-primary mr-2"></span>
                        Vault Encrypted
                    </div>
</div>
<p class="text-[9px] text-surface-bright font-label leading-relaxed">
                    UNAUTHORIZED ACCESS PROHIBITED BY PROTOCOL 84-C.<br/>
                    IP LOGGING AND THERMAL TRACING ACTIVE.
                </p>
</footer>
</div>
<!-- Decorative Security Lines -->
<div class="absolute -top-10 -left-10 w-24 h-24 border-t-2 border-l-2 border-primary/20 pointer-events-none"></div>
<div class="absolute -bottom-10 -right-10 w-24 h-24 border-b-2 border-r-2 border-primary/20 pointer-events-none"></div>
</main>
<!-- Bottom Status Bar -->
<div class="fixed bottom-0 left-0 w-full px-10 py-4 flex justify-between items-center bg-surface-container-lowest/50 backdrop-blur-md">
<div class="text-[10px] font-label text-on-surface-variant tracking-[0.3em] uppercase">
            System Hash: f7a2..90bc
        </div>
<div class="text-[10px] font-label text-on-surface-variant tracking-[0.3em] uppercase">
            v4.2.0-Production
        </div>
</div>
</body></html>
