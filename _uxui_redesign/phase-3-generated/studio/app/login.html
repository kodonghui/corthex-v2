<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - CORTHEX Studio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cyan: {
                            50: '#ECFEFF',
                            100: '#CFFAFE',
                            200: '#A5F3FC',
                            300: '#67E8F9',
                            400: '#22D3EE',
                            500: '#06B6D4',
                            600: '#0891B2',
                            700: '#0E7490',
                            800: '#155E75',
                            900: '#164E63',
                            950: '#083344',
                        },
                        slate: {
                            50: '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            300: '#CBD5E1',
                            400: '#94A3B8',
                            500: '#64748B',
                            600: '#475569',
                            700: '#334155',
                            800: '#1E293B',
                            900: '#0F172A',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        "headline": ["Work Sans"],
                        "body": ["Work Sans"],
                        "label": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #ECFEFF;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="antialiased text-slate-900 bg-cyan-50 min-h-screen flex flex-col">
<!-- Header / TopNavBar (Suppressed active navigation for login journey) -->
<header class="bg-cyan-50/50 dark:bg-slate-950/50 backdrop-blur-md fixed top-0 w-full border-b border-cyan-100 dark:border-slate-800 shadow-sm flex justify-between items-center px-6 h-16 w-full z-50">
<div class="text-xl font-bold tracking-tight text-cyan-700 dark:text-cyan-400">
            CORTHEX Studio
        </div>
<div class="flex items-center gap-4">
<button class="text-slate-600 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-300 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">help</span>
</button>
<button class="text-slate-600 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-300 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">dark_mode</span>
</button>
</div>
</header>
<!-- Main Content Area: Login Centered Card -->
<main class="flex-grow flex items-center justify-center px-4 pt-16 pb-20">
<div class="max-w-md w-full">
<!-- Branding & Welcome -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-xl shadow-sm mb-4 border border-cyan-100">
<span class="material-symbols-outlined text-cyan-600 text-4xl" style="font-variation-settings: 'FILL' 1;">
                        hub
                    </span>
</div>
<h1 class="text-2xl font-bold text-slate-900 tracking-tight">Welcome back</h1>
<p class="text-slate-500 mt-2">Enter your credentials to access your studio</p>
</div>
<!-- Login Card -->
<div class="bg-white p-8 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-cyan-100/50">
<form action="#" class="space-y-5" method="POST">
<!-- Email Address -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-cyan-600 transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-400" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="block text-sm font-medium text-slate-700" for="password">Password</label>
<a class="text-xs font-semibold text-cyan-600 hover:text-cyan-700 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-cyan-600 transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="h-4 w-4 text-cyan-600 focus:ring-cyan-500 border-slate-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600" for="remember-me">
                            Remember me for 30 days
                        </label>
</div>
<!-- Login Button -->
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-cyan-600 hover:bg-cyan-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 active:scale-[0.98] transition-all" type="submit">
                        Sign in to Studio
                    </button>
</form>
<!-- Divider -->
<div class="mt-8 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-100"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white text-slate-400">Or continue with</span>
</div>
</div>
<!-- SSO Options -->
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center px-4 py-2 border border-slate-200 rounded-lg bg-white hover:bg-slate-50 transition-colors group">
<img alt="Google" class="w-5 h-5 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCriVYuXweTWpwt-e0-_28IMGP5EM7GTGPV6i2C07N7GVfx4S0AY5FxF-zSs7sjSNbeprU468wT_M2L7a5MKuDiQzAsZcuQBdVW-LEsby_TEqJ6v3JaMLFjjwnZ-B807tpTucxd0l_Dnq9Mj9lQhEIDOrA1o-yDzpRgndTGXWQu1hJ7U6p9j6bEWYCyufUcQmYm_ZvpxTioSYE43XNOxP7WYotpP9u_VymPpWWrPHFAH5oX-clQhIHY3ECKVyYLPoDZflJ-QQrlBbZB"/>
<span class="text-sm font-medium text-slate-700">Google</span>
</button>
<button class="flex items-center justify-center px-4 py-2 border border-slate-200 rounded-lg bg-white hover:bg-slate-50 transition-colors group">
<span class="material-symbols-outlined text-slate-900 mr-2 text-xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="text-sm font-medium text-slate-700">SSO</span>
</button>
</div>
</div>
<!-- Footnote -->
<p class="mt-8 text-center text-sm text-slate-500">
                Don't have an account? 
                <a class="font-semibold text-cyan-600 hover:text-cyan-700 transition-colors" href="#">Start 14-day free trial</a>
</p>
</div>
</main>
<!-- Footer (Universal Anchor) -->
<footer class="bg-transparent fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-4 w-full">
<div class="text-xs font-medium uppercase tracking-wider text-slate-500 opacity-80">
            © 2024 CORTHEX Studio. All rights reserved.
        </div>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="text-xs font-medium uppercase tracking-wider text-slate-500 opacity-80 hover:opacity-100 hover:underline decoration-cyan-500 transition-opacity" href="#">Privacy Policy</a>
<a class="text-xs font-medium uppercase tracking-wider text-slate-500 opacity-80 hover:opacity-100 hover:underline decoration-cyan-500 transition-opacity" href="#">Terms of Service</a>
<a class="text-xs font-medium uppercase tracking-wider text-slate-500 opacity-80 hover:opacity-100 hover:underline decoration-cyan-500 transition-opacity" href="#">Support</a>
</div>
</footer>
<!-- Decorative Elements (Asymmetric Glows) -->
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-cyan-200/20 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[35%] h-[35%] bg-cyan-100/30 blur-[100px] rounded-full pointer-events-none -z-10"></div>
</body></html>
