## CORTHEX v3 "OpenClaw" — Project Context (Auto-Scanned)
## Generated: 2026-03-25

project:
  name: "CORTHEX"
  description: "AI Virtual Office Management Platform"
  framework: react
  language: typescript
  bundler: vite
  runtime: bun
  monorepo: turborepo
  version: "3.0 (OpenClaw)"

packages:
  app:
    name: "@corthex/app"
    path: "packages/app"
    port: 5174
    description: "CEO app — user-facing pages"
    router: react-router-dom v7 (BrowserRouter)
    state: zustand + @tanstack/react-query
    icons: lucide-react 0.577.0
    ui_lib: "@corthex/ui + @radix-ui/react-dialog + @subframe/core (legacy)"
    charts: lightweight-charts
    flow: "@xyflow/react"
    dnd: "@dnd-kit/core + sortable"
    editor: codemirror
    markdown: react-markdown
    toast: sonner

  admin:
    name: "@corthex/admin"
    path: "packages/admin"
    port: 5173
    description: "Admin console — management pages"
    router: react-router-dom v7 (BrowserRouter, basename=/admin)
    state: zustand + @tanstack/react-query
    icons: lucide-react 0.577.0
    flow: "@xyflow/react + elkjs"
    export: html-to-image

  landing:
    name: "@corthex/landing"
    path: "packages/landing"
    description: "Landing page — marketing/signup"
    router: none (single page)
    css: tailwindcss v4

  shared:
    name: "@corthex/shared"
    path: "packages/shared"
    description: "Shared types"

  ui:
    name: "@corthex/ui"
    path: "packages/ui"
    description: "Shared UI components"

  server:
    name: "@corthex/server"
    path: "packages/server"
    description: "Backend (Hono + Bun)"

paths:
  root: "."
  # App package
  app_entry: "packages/app/src/main.tsx"
  app_router: "packages/app/src/App.tsx"
  app_layout: "packages/app/src/components/layout.tsx"
  app_sidebar: "packages/app/src/components/sidebar.tsx"
  app_index_html: "packages/app/index.html"
  app_css: "packages/app/src/index.css"
  app_themes_css: "packages/app/src/styles/themes.css"
  app_theme_store: "packages/app/src/stores/theme-store.ts"
  app_theme_selector: "packages/app/src/components/settings/theme-selector.tsx"
  app_ui_theme_css: "packages/app/src/ui/theme.css"
  app_pages_dir: "packages/app/src/pages/"

  # Admin package
  admin_entry: "packages/admin/src/main.tsx"
  admin_router: "packages/admin/src/App.tsx"
  admin_layout: "packages/admin/src/components/layout.tsx"
  admin_sidebar: "packages/admin/src/components/sidebar.tsx"
  admin_index_html: "packages/admin/index.html"
  admin_css: "packages/admin/src/index.css"
  admin_pages_dir: "packages/admin/src/pages/"

  # Landing package
  landing_entry: "packages/landing/src/main.tsx"
  landing_app: "packages/landing/src/App.tsx"
  landing_index_html: "packages/landing/index.html"
  landing_css: "packages/landing/src/index.css"

  # Config
  tsconfig: "packages/app/tsconfig.json"

type_check_cmd: "cd packages/app && npx tsc --noEmit && cd ../admin && npx tsc --noEmit"

css_framework:
  name: "tailwindcss"
  version: "4"
  config_method: "@theme block in index.css (Tailwind v4 CSS-first config)"
  no_tailwind_config_file: true  # Tailwind v4 uses CSS @theme, not tailwind.config.ts

current_theme_system:
  method: "CSS custom properties via @theme + data-theme attribute"
  store: "zustand (theme-store.ts) with localStorage persistence"
  default_theme: "sovereign (natural-organic)"
  existing_themes:
    - "sovereign (Natural Organic — olive/cream light)"
    - "imperial (Imperial Red + Obsidian dark)"
    - "tactical (Military Green dark)"
    - "mystic (Deep Indigo dark)"
    - "stealth (Near-black minimal)"
  problem: "layout.tsx and sidebar.tsx use HARDCODED hex values instead of CSS variables"

hardcoded_colors_inventory:
  app_layout:
    - "bg-[#faf8f5]"
    - "text-[#1a1a1a]"
    - "border-[#e5e1d3]"
    - "bg-[#f5f0e8]"
    - "text-[#6b705c]"
    - "text-[#a3a08e]"
    - "border-[#d4cfc4]"
    - "bg-[#606C38]"
    - "focus:border-[#606C38]"
    - "focus:ring-[#606C38]"
  app_sidebar:
    - "bg-[#283618]"
    - "border-[#3a4d28]"
    - "bg-[#606C38]/30"
    - "text-[#c5d8a4]"
    - "text-[#a3c48a]"
    - "bg-[#e5e1d3]/20"
    - "bg-[#606C38]"
  admin_layout:
    - "bg-[#faf8f5]"
    - "style={{ backgroundColor: '#5a7247' }}"
  note: "ALL must be replaced with CSS variable references (var(--color-corthex-*))"

