    # GROUP 4: ARGOS (Jobs/Workflows)
    - route: "/jobs"
      component: "packages/app/src/pages/jobs.tsx"
      export: "JobsPage"
    - route: "/n8n-workflows"
      component: "packages/app/src/pages/n8n-workflows.tsx"
      export: "N8nWorkflowsPage"
    - route: "/marketing-pipeline"
      component: "packages/app/src/pages/marketing-pipeline.tsx"
      export: "MarketingPipelinePage"
    - route: "/marketing-approval"
      component: "packages/app/src/pages/marketing-approval.tsx"
      export: "MarketingApprovalPage"

    # GROUP 5: Activity/System
    - route: "/activity-log"
      component: "packages/app/src/pages/activity-log.tsx"
