      component: "packages/app/src/pages/onboarding.tsx"
      export: "OnboardingPage"
      auth: true
      layout: false
    - route: "/hub"
      component: "packages/app/src/pages/hub.tsx"
      export: "HubPage"
      default: true  # / redirects here
    - route: "/dashboard"
