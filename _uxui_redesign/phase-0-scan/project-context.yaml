    # Redirects (not separate pages)
    redirects:
      - from: "/" to: "/hub"
      - from: "/command-center" to: "/hub"
      - from: "/org" to: "/organization"
      - from: "/cron" to: "/jobs"
      - from: "/argos" to: "/jobs"
      - from: "/workflows" to: "/n8n-workflows"
      - from: "/home" to: "/hub"

