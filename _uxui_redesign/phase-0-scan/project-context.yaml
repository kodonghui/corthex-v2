  admin: 28
  landing: 1
  total: 59

current_tokens:
  fonts:
    heading: "Inter"
    body: "Inter"
    mono: "JetBrains Mono"
    serif: "Noto Serif KR"
  colors:
    accent: "#606C38 (olive)"
    accent_deep: "#283618 (dark olive)"
    bg: "#faf8f5 (cream)"
    surface: "#ffffff"
    elevated: "#f5f0e8"
    border: "#e5e1d3"
    text_primary: "#1a1a1a"
    text_secondary: "#6b705c"
  color_mode: "light (default sovereign/natural-organic theme)"
  dark_mode: "available via theme switching (imperial/tactical/mystic/stealth)"

app_shell:
  app:
    layout_file: "packages/app/src/components/layout.tsx"
    sidebar_file: "packages/app/src/components/sidebar.tsx"
    font_cdn: "Inter + JetBrains Mono + Noto Serif KR (Google Fonts)"
    sidebar_width: "280px (collapsed: 64px)"
    topbar_height: "56px"
    features:
      - "Collapsible sidebar with localStorage persistence"
      - "Mobile responsive (overlay sidebar on <lg)"
      - "Breadcrumbs in desktop topbar"
      - "Search bar (Ctrl+K placeholder)"
      - "Notification badge (live polling)"
      - "SwitchToAdmin button"
      - "Build number display"
  admin:
    layout_file: "packages/admin/src/components/layout.tsx"
    sidebar_file: "packages/admin/src/components/sidebar.tsx"
    font_cdn: "Inter + JetBrains Mono + Noto Serif KR (Google Fonts)"
    features:
      - "Company selector"
      - "Onboarding redirect"
      - "Error boundary per page"

