# LLM Model Catalog -- CORTHEX v2
# Pricing: USD per 1M tokens
# Updated: 2026-03-24

models:
  # === Anthropic ===
  - id: claude-sonnet-4-6
    provider: anthropic
    displayName: Claude Sonnet 4.6
    inputPricePer1M: 3
    outputPricePer1M: 15
    maxTokens: 8192
    supportsBatch: true
    tierDefault: [manager]

  - id: claude-haiku-4-5
    provider: anthropic
    displayName: Claude Haiku 4.5
    inputPricePer1M: 0.8
    outputPricePer1M: 4
    maxTokens: 8192
    supportsBatch: true
    tierDefault: [specialist, worker]

  # === OpenAI ===
  - id: gpt-4.1
    provider: openai
    displayName: GPT-4.1
    inputPricePer1M: 2.5
    outputPricePer1M: 10
    maxTokens: 16384
    supportsBatch: true

  - id: gpt-4.1-mini
    provider: openai
    displayName: GPT-4.1 Mini
    inputPricePer1M: 0.4
    outputPricePer1M: 1.6
    maxTokens: 16384
    supportsBatch: true

# Fallback order when provider fails
fallbackOrder: [anthropic, openai]

# Default model per agent tier
tierDefaults:
  manager: claude-sonnet-4-6
  specialist: claude-haiku-4-5
  worker: claude-haiku-4-5
