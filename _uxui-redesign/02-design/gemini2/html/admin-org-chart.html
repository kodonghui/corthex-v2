<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTHEX Admin - Org Chart Hierarchy Map</title>
    <!-- API: GET /api/admin/org-chart -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neo-bg': '#F4F4F0',
                        'neo-black': '#1E1E1E',
                        'neo-yellow': '#FFE800',
                        'neo-lime': '#BFFF00',
                        'neo-pink': '#FF3366',
                        'neo-blue': '#00E5FF',
                        'neo-orange': '#FF6600',
                    },
                    boxShadow: {
                        'neo-sm': '2px 2px 0px 0px rgba(30,30,30,1)',
                        'neo': '4px 4px 0px 0px rgba(30, 30, 30, 1)',
                        'neo-lg': '8px 8px 0px 0px rgba(30, 30, 30, 1)',
                    },
                    borderWidth: { '3': '3px', '4': '4px' },
                    fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F4F4F0;
            color: #1E1E1E;
        }

        .neo-border {
            border: 3px solid #1E1E1E;
        }

        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(30, 30, 30, 1);
        }

        .neo-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(30, 30, 30, 1);
        }

        .neo-card {
            border: 3px solid #1E1E1E;
            box-shadow: 8px 8px 0px 0px rgba(30, 30, 30, 1);
            background-color: white;
        }

        .neo-btn {
            border: 3px solid #1E1E1E;
            box-shadow: 4px 4px 0px 0px rgba(30, 30, 30, 1);
            transition: all 0.1s ease-in-out;
            font-weight: 700;
            cursor: pointer;
        }

        .neo-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(30, 30, 30, 1);
        }

        .neo-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(30, 30, 30, 1);
        }

        .nav-item.active {
            background-color: #BFFF00;
            border: 3px solid #1E1E1E;
            box-shadow: 2px 2px 0px 0px rgba(30, 30, 30, 1);
        }

        .nav-item:hover:not(.active) {
            background-color: #E5E5E5;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
            border-left: 3px solid #1E1E1E;
            border-top: 3px solid #1E1E1E;
        }

        ::-webkit-scrollbar-track {
            background: #F4F4F0;
        }

        ::-webkit-scrollbar-thumb {
            background: #1E1E1E;
            border: 2px solid #F4F4F0;
        }

        .admin-bg {
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-neo-black admin-bg">

    <header
        class="h-16 border-b-3 border-neo-black bg-white flex items-center justify-between px-6 z-30 shrink-0 sticky top-0 shadow-[0px_4px_0px_#1E1E1E]">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-tight uppercase flex items-center gap-2">
                <span class="bg-neo-pink text-white px-2 border-2 border-black rotate-[-2deg] shadow-sm">CORTHEX</span>
                ADMIN
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <div
                class="w-10 h-10 bg-neo-lime rounded-full border-3 border-neo-black shadow-sm flex items-center justify-center font-black">
                SW</div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-4rem)]">

        <nav class="w-64 border-r-3 border-neo-black bg-white flex flex-col h-full z-10 shrink-0 overflow-y-auto">
            <div class="p-4 space-y-1">
                <p class="text-[10px] uppercase font-black tracking-widest text-gray-400 mt-2 mb-1 pl-2">Platform
                    Overview</p>
                <a href="admin-dashboard.html"
                    class="nav-item flex items-center gap-3 p-2 font-bold transition-colors text-sm">🏢 Dashboard</a>

                <p class="text-[10px] uppercase font-black tracking-widest text-gray-400 mt-6 mb-1 pl-2">Templates &
                    Market</p>
                <a href="admin-org-templates.html"
                    class="nav-item flex items-center gap-3 p-2 font-bold transition-colors text-sm">📑 Org
                    Templates</a>
                <a href="admin-org-chart.html"
                    class="nav-item active flex items-center gap-3 p-2 font-bold transition-colors text-sm">🗺 Global
                    Org Map</a>
            </div>
        </nav>

        <main class="flex-grow flex flex-col h-full bg-transparent overflow-hidden w-full relative z-0">
            <!-- Top Bar for Map -->
            <div
                class="bg-white border-b-3 border-neo-black p-4 flex justify-between items-center shrink-0 z-20 shadow-[0px_4px_0px_#1E1E1E]">
                <h2 class="text-xl font-black uppercase">Standard Organization Blueprint</h2>
                <div class="flex items-center gap-2">
                    <button
                        class="bg-white border-2 border-neo-black px-3 py-1 text-xs font-bold uppercase shadow-[2px_2px_0px_#000] hover:-translate-y-px">+
                        Add Node</button>
                    <!-- API: POST /api/admin/org-chart/save -->
                    <button
                        class="bg-neo-lime border-2 border-neo-black px-3 py-1 text-xs font-black uppercase shadow-[2px_2px_0px_#000] hover:-translate-y-px">Save
                        Blueprint</button>
                </div>
            </div>

            <!-- Visual Graph Area (Interactive Node Map concept) -->
            <!-- API: GET /api/admin/org-chart/graph -->
            <div class="flex-grow relative overflow-auto p-12 cursor-grab flex items-center justify-center">

                <div class="relative w-full max-w-4xl text-center">

                    <!-- CEO Level -->
                    <div class="inline-block relative z-10 mx-auto">
                        <div
                            class="bg-black text-white neo-border px-6 py-4 font-black uppercase text-xl shadow-[6px_6px_0px_#FF3366] transform hover:-translate-y-1 transition-transform cursor-pointer">
                            Executive Directive
                            <div class="text-[10px] text-gray-400 mt-1 block">Root Command</div>
                        </div>
                        <!-- Line down -->
                        <div
                            class="absolute left-1/2 bottom-0 transform -translate-x-1/2 translate-y-full w-1 h-8 bg-black">
                        </div>
                    </div>

                    <div class="h-8"></div> <!-- Spacer -->

                    <!-- Horizontal Connector -->
                    <div class="w-3/4 max-w-2xl h-1 bg-black mx-auto relative z-0">
                        <!-- Line connections for children -->
                        <div class="absolute left-0 top-0 w-1 h-8 bg-black"></div>
                        <div class="absolute left-1/2 transform -translate-x-1/2 top-0 w-1 h-8 bg-black"></div>
                        <div class="absolute right-0 top-0 w-1 h-8 bg-black"></div>
                    </div>

                    <div class="h-8"></div> <!-- Spacer -->

                    <!-- Dept Level -->
                    <div class="flex justify-between max-w-3xl mx-auto relative z-10 w-full">

                        <!-- CMO Node -->
                        <div
                            class="neo-card bg-neo-yellow px-4 py-3 min-w-[160px] text-center transform hover:-translate-y-1 transition-transform cursor-pointer group">
                            <span class="font-black uppercase block border-b-2 border-black pb-1 mb-1">Marketing</span>
                            <span class="text-xs font-bold block">CMO Default</span>
                            <!-- + button hidden until hover -->
                            <div
                                class="absolute -bottom-3 left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button
                                    class="w-6 h-6 rounded-full bg-white border-2 border-neo-black font-black text-xs shadow-sm">+</button>
                            </div>
                        </div>

                        <!-- CPO Node -->
                        <div
                            class="neo-card bg-neo-blue text-white px-4 py-3 min-w-[160px] text-center transform hover:-translate-y-1 transition-transform cursor-pointer">
                            <span class="font-black uppercase block border-b-2 border-white pb-1 mb-1">Product</span>
                            <span class="text-xs font-bold block">CPO Default</span>
                        </div>

                        <!-- CTO Node -->
                        <div
                            class="neo-card bg-gray-200 px-4 py-3 min-w-[160px] text-center transform hover:-translate-y-1 transition-transform cursor-pointer border-dashed">
                            <span
                                class="font-black uppercase block border-b-2 border-dashed border-gray-400 pb-1 mb-1 text-gray-600">Engineering</span>
                            <span class="text-xs font-bold block text-gray-500">Draft</span>
                        </div>

                    </div>

                </div>

            </div>

        </main>
    </div>

</body>

</html>
