<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX v2 - 로그인</title>
<!-- Noto Serif KR & Pretendard Font Loading -->
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'organic-beige': '#faf8f5',
            'olive-green': '#5a7247',
            'terracotta': '#c4622d',
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['Pretendard', 'ui-sans-serif', 'system-ui'],
          },
        }
      }
    }
  </script>
<style data-purpose="typography">
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #faf8f5;
    }
    h1, h2, h3 {
      font-family: 'Noto Serif KR', serif;
    }
  </style>
<style data-purpose="custom-shadows">
    .soft-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="bg-organic-beige min-h-screen flex items-center justify-center p-4">
<!-- API: POST /api/auth/login -->
<!-- BEGIN: LoginContainer -->
<main class="w-full max-w-md" data-purpose="login-page-container">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full soft-shadow mb-4" data-purpose="logo-wrapper">
<!-- Placeholder for CORTHEX v2 Logo -->
<span class="text-olive-green font-serif text-2xl font-bold">C</span>
</div>
<h1 class="text-2xl font-bold text-gray-800">CORTHEX v2</h1>
<p class="text-gray-500 mt-2">자연스러운 연결의 시작</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginFormCard -->
<section class="bg-white rounded-2xl p-8 soft-shadow" data-purpose="login-card">
<form action="#" class="space-y-6" id="login-form" method="POST">
<!-- Username Field -->
<div class="space-y-1">
<label class="block text-sm font-medium text-gray-700" for="username">사용자 아이디</label>
<input class="w-full px-4 py-3 rounded-xl border-gray-200 focus:border-olive-green focus:ring-olive-green transition-colors duration-200" id="username" name="username" placeholder="아이디를 입력하세요" required="" type="text"/>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="block text-sm font-medium text-gray-700" for="password">비밀번호</label>
<input class="w-full px-4 py-3 rounded-xl border-gray-200 focus:border-olive-green focus:ring-olive-green transition-colors duration-200" id="password" name="password" placeholder="비밀번호를 입력하세요" required="" type="password"/>
</div>
<!-- Error Message Area -->
<!-- This area is hidden by default and shown when an error occurs -->
<div class="hidden p-3 rounded-lg bg-orange-50 border border-terracotta/20 text-terracotta text-sm" data-purpose="error-display" id="error-area">
<p id="error-message">아이디 또는 비밀번호가 일치하지 않습니다.</p>
</div>
<!-- Login Button -->
<div class="pt-2">
<button class="w-full bg-olive-green hover:bg-opacity-90 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-md" data-purpose="submit-button" type="submit">
            로그인
          </button>
</div>
<!-- Accents / Links -->
<div class="flex items-center justify-between text-xs text-gray-500 pt-2">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="rounded text-olive-green focus:ring-olive-green border-gray-300" type="checkbox"/>
<span>아이디 저장</span>
</label>
<div class="space-x-3">
<a class="hover:text-terracotta transition-colors" href="#">아이디 찾기</a>
<span class="text-gray-300">|</span>
<a class="hover:text-terracotta transition-colors" href="#">비밀번호 찾기</a>
</div>
</div>
</form>
</section>
<!-- END: LoginFormCard -->
<!-- BEGIN: FooterLinks -->
<footer class="mt-8 text-center text-sm text-gray-400">
<p>© 2023 CORTHEX. All rights reserved.</p>
<div class="mt-2 space-x-4">
<a class="hover:underline" href="#">개인정보처리방침</a>
<a class="hover:underline" href="#">이용약관</a>
</div>
</footer>
<!-- END: FooterLinks -->
</main>
<!-- END: LoginContainer -->
<script data-purpose="form-interaction">
    document.getElementById('login-form').addEventListener('submit', function(e) {
      // For demonstration, preventing actual submit to show error handling visual
      e.preventDefault();
      
      const errorArea = document.getElementById('error-area');
      // Simple toggle to show we can display errors
      errorArea.classList.toggle('hidden');
    });
  </script>
</body></html>
