<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5a7247",
                        "background-light": "#faf8f5",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "serif-ko": ["Noto Serif KR", "serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .pretendard {
            font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex h-screen overflow-hidden">
<!-- SideNavBar -->
<aside class="w-64 flex-shrink-0 bg-white dark:bg-stone-900 border-r border-stone-200 dark:border-stone-800 flex flex-col justify-between p-4">
<div class="flex flex-col gap-8">
<div class="flex items-center gap-3 px-2">
<div class="bg-primary/20 rounded-lg p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl">eco</span>
</div>
<div class="flex flex-col">
<h1 class="text-slate-900 dark:text-white text-base font-bold leading-none">CORTHEX v2</h1>
<p class="text-stone-500 text-xs font-medium mt-1">Professional System</p>
</div>
</div>
<nav class="flex flex-col gap-1">
<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-[24px]">dashboard</span>
<p class="text-sm font-semibold">대시보드</p>
</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">work</span>
<p class="text-sm font-medium">프로젝트</p>
</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">bar_chart</span>
<p class="text-sm font-medium">분석</p>
</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">settings</span>
<p class="text-sm font-medium">설정</p>
</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">support_agent</span>
<p class="text-sm font-medium">고객지원</p>
</div>
</nav>
</div>
<div class="mt-auto pt-4 border-t border-stone-200 dark:border-stone-800">
<div class="flex items-center gap-3 px-2">
<div class="w-10 h-10 rounded-full bg-stone-200 dark:bg-stone-700 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYK0-5qjzzBaJw3qyF_zSU3zhqYAiXKCSXEjLxSTS3mlIm4_Sa3oeNMKc1WWDkvaFKxX3LfNn92MnbFH0_zjbZAcFYuoM05w9S08q-7dlsiOCH8Ju4a84aVdULBG5w4yi1AAsmqq_LelhhMmmrVixtc0FPXpEb3Lg0DRcUoayMe2PsQaug2kHLBPIO9XG8rE5z6KmnH7W1_17vOSvSfZeBPW-sSjWIh7Z3TUEdCkX8jX5GF9SgDrEF7pxqkW4_SgUiz5TtxtawSJCL"/>
</div>
<div class="flex flex-col">
<p class="text-sm font-bold">Admin User</p>
<p class="text-xs text-stone-500">admin@corthex.io</p>
</div>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto flex items-center justify-center p-6 @container">
<div class="max-w-3xl w-full bg-white dark:bg-stone-900 rounded-3xl shadow-xl shadow-stone-200/50 dark:shadow-none border border-stone-100 dark:border-stone-800 overflow-hidden flex flex-col md:flex-row">
<!-- Illustration Section -->
<div class="md:w-5/12 bg-primary/5 dark:bg-primary/10 flex items-center justify-center p-12">
<div class="relative w-full aspect-square max-w-[240px]">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl opacity-50"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center text-primary">
<span class="material-symbols-outlined text-[120px] opacity-80">cloud_off</span>
<div class="mt-4 flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary/40"></div>
<div class="w-2 h-2 rounded-full bg-primary/60"></div>
<div class="w-2 h-2 rounded-full bg-primary/80"></div>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="md:w-7/12 p-10 flex flex-col justify-center gap-6">
<div class="space-y-4">
<h2 class="font-serif-ko text-3xl md:text-4xl text-slate-900 dark:text-white font-bold leading-tight">
                            연결에 문제가 발생했습니다
                        </h2>
<div class="pretendard space-y-3">
<p class="text-stone-600 dark:text-stone-400 text-lg leading-relaxed">
                                요청하신 페이지를 찾을 수 없거나 서버 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.
                            </p>
<div class="inline-flex items-center px-3 py-1 bg-stone-100 dark:bg-stone-800 rounded-lg">
<span class="material-symbols-outlined text-stone-400 text-sm mr-2">error_outline</span>
<code class="text-stone-500 dark:text-stone-400 text-xs font-mono">ERR_CONNECTION_TIMEOUT</code>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row gap-3 pt-4">
<button class="flex-1 flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-lg">refresh</span>
<span>다시 시도하기</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 bg-stone-100 dark:bg-stone-800 hover:bg-stone-200 dark:hover:bg-stone-700 text-stone-700 dark:text-stone-200 font-bold py-3 px-6 rounded-xl transition-all">
<span class="material-symbols-outlined text-lg">home</span>
<span>홈으로 이동</span>
</button>
</div>
<div class="pt-6 border-t border-stone-100 dark:border-stone-800">
<div class="flex items-center gap-3 text-stone-500 dark:text-stone-500">
<span class="material-symbols-outlined text-xl">help</span>
<p class="text-sm">문제가 지속되나요? <a class="text-primary hover:underline font-semibold" href="#">고객센터에 문의하기</a></p>
</div>
</div>
</div>
</div>
</main>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[300px] h-[300px] bg-primary/5 rounded-full blur-[100px]"></div>
</body></html>
