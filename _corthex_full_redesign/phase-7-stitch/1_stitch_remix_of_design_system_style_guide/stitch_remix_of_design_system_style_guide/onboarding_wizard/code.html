<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX v2 - 온보딩 위저드</title>
<!-- 
    API: GET /onboarding/status, GET /onboarding/templates, POST /onboarding/select-template, POST /onboarding/complete 
  -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            organic: {
              bg: '#faf8f5',
              olive: '#556b2f',
              'olive-light': '#6b8e23',
              'olive-pale': '#f0f2eb'
            }
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    body {
      background-color: #faf8f5;
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Noto Serif KR', serif;
    }
    .step-transition {
      transition: all 0.3s ease-in-out;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: OnboardingWizardContainer -->
<main class="w-full max-w-4xl" data-purpose="onboarding-wizard">
<!-- BEGIN: WizardCard -->
<section class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden" data-purpose="wizard-card">
<!-- Progress Bar Header -->
<div class="bg-stone-50 px-8 py-4 border-b border-stone-100 flex justify-between items-center" data-purpose="wizard-header">
<div class="flex items-center space-x-4">
<span class="text-xs font-semibold text-stone-400 uppercase tracking-widest">Step</span>
<div class="flex space-x-2">
<div class="w-2.5 h-2.5 rounded-full bg-organic-olive" id="dot-1"></div>
<div class="w-2.5 h-2.5 rounded-full bg-stone-200" id="dot-2"></div>
</div>
</div>
<div class="text-sm font-medium text-stone-500" id="step-indicator">1 / 2</div>
</div>
<div class="p-8 md:p-12">
<!-- BEGIN: Step1Content -->
<div class="step-transition" id="step-1">
<header class="mb-10 text-center">
<h1 class="text-3xl font-bold text-stone-800 mb-3">템플릿 선택</h1>
<p class="text-stone-500">CORTHEX v2 시작을 위한 비즈니스 환경을 선택해 주세요.</p>
</header>
<!-- Template Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10" data-purpose="template-selection-grid">
<!-- Basic Template -->
<label class="relative flex flex-col p-6 border-2 border-stone-100 rounded-2xl cursor-pointer hover:border-organic-olive-light transition-colors group has-[:checked]:border-organic-olive has-[:checked]:bg-organic-pale">
<input checked="" class="sr-only peer" name="template" type="radio" value="basic"/>
<span class="text-4xl mb-4">🏢</span>
<h3 class="text-lg font-bold text-stone-800 mb-1">기본형 (Basic)</h3>
<p class="text-sm text-stone-500">핵심적인 관리 부서와 에이전트로 구성된 표준 환경입니다.</p>
<div class="absolute top-4 right-4 w-5 h-5 rounded-full border-2 border-stone-200 peer-checked:border-organic-olive peer-checked:bg-organic-olive flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Tech Template -->
<label class="relative flex flex-col p-6 border-2 border-stone-100 rounded-2xl cursor-pointer hover:border-organic-olive-light transition-colors group has-[:checked]:border-organic-olive has-[:checked]:bg-organic-pale">
<input class="sr-only peer" name="template" type="radio" value="tech"/>
<span class="text-4xl mb-4">💻</span>
<h3 class="text-lg font-bold text-stone-800 mb-1">기술 중심 (Tech)</h3>
<p class="text-sm text-stone-500">개발 및 엔지니어링 워크플로우에 최적화된 에이전트 구성입니다.</p>
<div class="absolute top-4 right-4 w-5 h-5 rounded-full border-2 border-stone-200 peer-checked:border-organic-olive peer-checked:bg-organic-olive flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Marketing Template -->
<label class="relative flex flex-col p-6 border-2 border-stone-100 rounded-2xl cursor-pointer hover:border-organic-olive-light transition-colors group has-[:checked]:border-organic-olive has-[:checked]:bg-organic-pale">
<input class="sr-only peer" name="template" type="radio" value="marketing"/>
<span class="text-4xl mb-4">📢</span>
<h3 class="text-lg font-bold text-stone-800 mb-1">마케팅 (Marketing)</h3>
<p class="text-sm text-stone-500">콘텐츠 제작 및 소셜 미디어 관리에 최적화된 구성입니다.</p>
<div class="absolute top-4 right-4 w-5 h-5 rounded-full border-2 border-stone-200 peer-checked:border-organic-olive peer-checked:bg-organic-olive flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
<!-- Investment Template -->
<label class="relative flex flex-col p-6 border-2 border-stone-100 rounded-2xl cursor-pointer hover:border-organic-olive-light transition-colors group has-[:checked]:border-organic-olive has-[:checked]:bg-organic-pale">
<input class="sr-only peer" name="template" type="radio" value="investment"/>
<span class="text-4xl mb-4">📈</span>
<h3 class="text-lg font-bold text-stone-800 mb-1">투자 분석 (Investment)</h3>
<p class="text-sm text-stone-500">시장 데이터 분석 및 자산 관리에 특화된 에이전트 환경입니다.</p>
<div class="absolute top-4 right-4 w-5 h-5 rounded-full border-2 border-stone-200 peer-checked:border-organic-olive peer-checked:bg-organic-olive flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</label>
</div>
<div class="flex justify-end">
<button class="px-8 py-3 bg-organic-olive hover:bg-organic-olive-light text-white font-semibold rounded-xl transition-all shadow-md active:scale-95" data-purpose="btn-next" onclick="goToStep(2)">
              다음 단계로
            </button>
</div>
</div>
<!-- END: Step1Content -->
<!-- BEGIN: Step2Content -->
<div class="hidden step-transition" id="step-2">
<header class="mb-10 text-center">
<h1 class="text-3xl font-bold text-stone-800 mb-3">설정 완료</h1>
<p class="text-stone-500">선택하신 템플릿에 따라 다음 부서와 에이전트가 생성됩니다.</p>
</header>
<div class="space-y-6 mb-10" data-purpose="summary-container">
<!-- Department Summary -->
<div class="bg-organic-pale rounded-2xl p-6 border border-organic-olive/10">
<h3 class="text-organic-olive font-bold mb-4 flex items-center">
<span class="mr-2">🏢</span> 생성될 부서
              </h3>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-white border border-stone-200 rounded-full text-sm text-stone-600 font-medium">경영전략부</span>
<span class="px-3 py-1 bg-white border border-stone-200 rounded-full text-sm text-stone-600 font-medium">기술개발팀</span>
<span class="px-3 py-1 bg-white border border-stone-200 rounded-full text-sm text-stone-600 font-medium">데이터분석실</span>
</div>
</div>
<!-- Agent Summary -->
<div class="bg-stone-50 rounded-2xl p-6 border border-stone-100">
<h3 class="text-stone-800 font-bold mb-4 flex items-center">
<span class="mr-2">🤖</span> 배치될 AI 에이전트
              </h3>
<ul class="space-y-3">
<li class="flex items-center text-sm text-stone-600">
<div class="w-1.5 h-1.5 rounded-full bg-organic-olive mr-3"></div>
                  수석 오케스트레이터 (Manager)
                </li>
<li class="flex items-center text-sm text-stone-600">
<div class="w-1.5 h-1.5 rounded-full bg-organic-olive mr-3"></div>
                  기술 리서치 어시스턴트
                </li>
<li class="flex items-center text-sm text-stone-600">
<div class="w-1.5 h-1.5 rounded-full bg-organic-olive mr-3"></div>
                  성과 분석 자동화 봇
                </li>
</ul>
</div>
</div>
<div class="flex justify-between items-center">
<button class="text-stone-400 hover:text-stone-600 font-medium px-4 py-2 transition-colors" onclick="goToStep(1)">
              이전으로
            </button>
<button class="px-10 py-3 bg-organic-olive hover:bg-organic-olive-light text-white font-bold rounded-xl transition-all shadow-md active:scale-95" data-purpose="btn-complete" onclick="alert('온보딩이 완료되었습니다!')">
              CORTHEX v2 시작하기
            </button>
</div>
</div>
<!-- END: Step2Content -->
</div>
</section>
<!-- END: WizardCard -->
<footer class="mt-8 text-center text-stone-400 text-sm">
      © 2024 CORTHEX Corp. All rights reserved.
    </footer>
</main>
<!-- END: OnboardingWizardContainer -->
<script data-purpose="navigation-logic">
    /**
     * Handles step switching in the wizard
     * @param {number} stepNumber - The step to navigate to
     */
    function goToStep(stepNumber) {
      const step1 = document.getElementById('step-1');
      const step2 = document.getElementById('step-2');
      const dot1 = document.getElementById('dot-1');
      const dot2 = document.getElementById('dot-2');
      const indicator = document.getElementById('step-indicator');

      if (stepNumber === 1) {
        step1.classList.remove('hidden');
        step2.classList.add('hidden');
        dot1.classList.replace('bg-stone-200', 'bg-organic-olive');
        dot2.classList.replace('bg-organic-olive', 'bg-stone-200');
        indicator.innerText = '1 / 2';
      } else {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
        dot1.classList.replace('bg-organic-olive', 'bg-stone-200');
        dot2.classList.replace('bg-stone-200', 'bg-organic-olive');
        indicator.innerText = '2 / 2';
      }
      
      // Scroll to top of card on step change
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body></html>
