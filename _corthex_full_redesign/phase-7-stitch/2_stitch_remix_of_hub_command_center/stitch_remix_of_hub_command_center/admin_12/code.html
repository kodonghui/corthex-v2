<script data-purpose="interaction-handlers">
    // Inline editing visual feedback logic
    document.querySelectorAll('input[data-field]').forEach(input => {
      input.addEventListener('change', function() {
        const rowId = this.closest('tr').dataset.id;
        console.log(`Department ${rowId} updated: ${this.dataset.field} = ${this.value}`);
        // Visual indicator that changes are unsaved
        this.classList.add('text-corthex-coral');
      });
    });

    // Save button logic
    document.querySelectorAll('button[title="저장"]').forEach(btn => {
      btn.addEventListener('click', function() {
        const row = this.closest('tr');
        const inputs = row.querySelectorAll('input[data-field]');
        inputs.forEach(input => input.classList.remove('text-corthex-coral'));
        alert(`부서 ID ${row.dataset.id}의 변경사항이 성공적으로 저장되었습니다.`);
      });
    });
  </script>
