<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX v2 - Login</title>
<!-- BEGIN: External Assets -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Assets -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-white': '#fcfbf9',
            'accent-coral': '#e57373',
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
          },
          borderRadius: {
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    /* Subtle fade-in for the card */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }
  </style>
</head>
<body class="bg-warm-white font-sans min-h-screen flex flex-col items-center justify-center p-4">
<!-- BEGIN: API Annotation -->
<div class="fixed top-6 left-1/2 -translate-x-1/2" data-purpose="api-annotation">
<div class="bg-stone-800 text-stone-300 px-4 py-1.5 rounded-full text-xs font-mono tracking-wider shadow-sm border border-stone-700">
<span class="text-green-400 font-bold">POST</span> /api/auth/login
    </div>
</div>
<!-- END: API Annotation -->
<!-- BEGIN: Login Container -->
<main class="w-full max-w-md animate-fade-in" data-purpose="login-form-container">
<!-- BEGIN: Brand Header -->
<header class="flex flex-col items-center mb-10" data-purpose="branding">
<!-- CORTHEX logo: geometric reduction - circle with 3 spokes -->
<div class="w-16 h-16 relative flex items-center justify-center mb-4" id="logo-icon">
<svg class="w-full h-full text-accent-coral" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="8" viewbox="0 0 100 100">
<circle cx="50" cy="50" r="40" stroke="currentColor" stroke-opacity="0.1"></circle>
<path d="M50 10 V50"></path>
<path d="M50 50 L15 70"></path>
<path d="M50 50 L85 70"></path>
<circle cx="50" cy="50" fill="currentColor" r="4"></circle>
</svg>
</div>
<h1 class="text-2xl font-bold text-stone-800 tracking-tight">CORTHEX <span class="text-accent-coral">v2</span></h1>
<p class="text-stone-500 mt-1 text-sm font-medium">Secure Portal Access</p>
</header>
<!-- END: Brand Header -->
<!-- BEGIN: Login Card -->
<div class="bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-stone-100 p-8 md:p-10">
<form action="#" class="space-y-6" method="POST">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-stone-700 ml-1" for="username">Username</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-accent-coral/20 focus:border-accent-coral transition-all outline-none placeholder:text-stone-400 text-stone-800" id="username" name="username" placeholder="e.g. j.smith" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-stone-700" for="password">Password</label>
<a class="text-xs font-medium text-stone-400 hover:text-accent-coral transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-2xl focus:ring-2 focus:ring-accent-coral/20 focus:border-accent-coral transition-all outline-none placeholder:text-stone-400 text-stone-800" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Form Options -->
<div class="flex items-center px-1">
<input class="h-4 w-4 rounded border-stone-300 text-accent-coral focus:ring-accent-coral" id="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-stone-500" for="remember-me">
            Keep me logged in
          </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-accent-coral hover:bg-[#d46565] text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-accent-coral/20 transform active:scale-[0.98] transition-all duration-200" type="submit">
          Sign In
        </button>
</form>
<!-- Footer Help -->
<footer class="mt-8 pt-6 border-t border-stone-50 text-center">
<p class="text-xs text-stone-400">
          Need assistance? Contact <a class="underline decoration-stone-200 hover:text-stone-600" href="mailto:support@corthex.net">IT Support</a>
</p>
</footer>
</div>
<!-- END: Login Card -->
<!-- System Status Footer -->
<div class="mt-8 flex justify-center items-center space-x-4 opacity-50">
<div class="flex items-center space-x-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
<span class="text-[10px] uppercase tracking-widest text-stone-500 font-bold">Systems Operational</span>
</div>
</div>
</main>
<!-- END: Login Container -->
</body></html>
