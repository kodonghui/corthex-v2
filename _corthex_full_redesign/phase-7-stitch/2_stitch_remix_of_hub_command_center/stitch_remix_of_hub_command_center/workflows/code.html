    tailwind.config = {

</div>

</div>
</div>

<path class="line-connection" d="M 720 215 C 784 215, 784 215, 848 215"></path>
</svg>
<!-- Node: Agent -->
<div class="relative">
<div class="workflow-node w-64 bg-white rounded-3xl p-5 border-2 border-sage ring-4 ring-sage/5 relative" data-purpose="node-agent">

<div class="text-[11px] leading-relaxed text-stone-600 bg-stone-50 p-3 rounded-xl">

<div class="w-2 h-2 bg-sage rounded-full"></div>
</div>

</div>
</div>
</div>

<p class="text-[11px] text-stone-400">Vector Search</p>
</div>
</div>
<!-- Input Port -->
<div class="absolute top-1/2 -left-3 w-6 h-6 bg-white border-2 border-stone-200 rounded-full flex items-center justify-center -translate-y-1/2">

</div>

<!-- Floating Add Node Button -->

<i class="ph ph-plus"></i>
</div>
<span class="font-bold text-stone-700">새로운 단계 추가</span>
</button>
<!-- END: UI Overlay Elements -->
<script data-purpose="interactivity">
    // Simple drag simulation for nodes (conceptual)
    document.querySelectorAll('.workflow-node').forEach(node => {
      node.addEventListener('mousedown', () => {
        node.classList.add('scale-[1.02]', 'cursor-grabbing');
      });
      node.addEventListener('mouseup', () => {
        node.classList.remove('scale-[1.02]', 'cursor-grabbing');
      });
    });
  </script>
