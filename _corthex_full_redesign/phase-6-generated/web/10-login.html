<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX Secure Login Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#20d3ee",
              "background-light": "#f8fafc",
              "background-dark": "#020617",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Subtle radial gradient background -->
<div class="absolute inset-0 pointer-events-none flex justify-center items-center">
<div class="w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<div class="relative w-full max-w-[400px] p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[16px] shadow-2xl z-10">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">CORTHEX</h1>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">AI 조직 관리 플랫폼</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">이메일</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="w-full h-11 pl-10 pr-4 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors text-sm" id="email" placeholder="이메일을 입력하세요" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">비밀번호</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">비밀번호를 잊으셨나요?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="w-full h-11 pl-10 pr-4 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors text-sm" id="password" placeholder="비밀번호를 입력하세요" required="" type="password"/>
</div>
</div>
<button class="w-full h-11 mt-2 bg-primary hover:bg-primary/90 text-slate-900 font-bold rounded-lg transition-colors flex items-center justify-center gap-2" type="submit">
<span>로그인</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-6">
<div class="flex-grow h-px bg-slate-200 dark:bg-slate-800"></div>
<span class="px-3 text-xs font-medium text-slate-500 dark:text-slate-400">또는</span>
<div class="flex-grow h-px bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- OAuth -->
<button class="w-full h-11 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium rounded-lg transition-colors flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-[20px] text-[#D97757]">smart_toy</span>
<span>Claude로 로그인</span>
</button>
<!-- Footer -->
<p class="mt-8 text-center text-xs text-slate-500 dark:text-slate-400">
            계속 진행함으로써 CORTHEX의 <a class="text-slate-700 dark:text-slate-300 hover:text-primary transition-colors underline decoration-slate-300 dark:decoration-slate-700 underline-offset-2" href="#">이용약관</a> 및 <a class="text-slate-700 dark:text-slate-300 hover:text-primary transition-colors underline decoration-slate-300 dark:decoration-slate-700 underline-offset-2" href="#">개인정보처리방침</a>에 동의합니다.
        </p>
</div>
</body></html>
