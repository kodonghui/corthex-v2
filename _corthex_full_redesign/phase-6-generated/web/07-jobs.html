<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX Jobs Scheduling Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f8fafc",
                        "background-dark": "#020617",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
<div class="flex h-screen w-full flex-col">
<div class="layout-container flex h-full grow flex-col overflow-y-auto">
<div class="px-8 flex flex-1 justify-center py-10">
<div class="layout-content-container flex flex-col w-full max-w-[1024px] flex-1">
<!-- Header -->
<div class="flex flex-wrap items-center justify-between gap-4 p-4 mb-4 border-b border-slate-200 dark:border-slate-800 pb-6">
<h1 class="text-slate-900 dark:text-white text-3xl font-semibold tracking-tight">작업</h1>
<button class="flex items-center justify-center rounded-lg h-10 px-5 bg-primary text-slate-900 hover:bg-primary/90 transition-colors text-sm font-semibold tracking-wide">
<span class="material-symbols-outlined mr-2 text-lg">add</span>
<span>작업 생성</span>
</button>
</div>
<!-- Filters and Search -->
<div class="flex flex-wrap items-center gap-4 px-4 py-4 mb-6 bg-slate-100 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="flex-1 min-w-[200px]">
<div class="relative flex items-center w-full h-10 rounded-lg bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 focus-within:border-primary dark:focus-within:border-primary transition-colors overflow-hidden">
<div class="flex items-center justify-center pl-3 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">search</span>
</div>
<input class="w-full bg-transparent border-none text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-500 dark:placeholder:text-slate-400 focus:ring-0 px-3 h-full" placeholder="작업 검색..." value=""/>
</div>
</div>
<div class="flex gap-4">
<select class="h-10 rounded-lg bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-sm text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary w-40">
<option value="">상태: 전체</option>
<option value="active">Active</option>
<option value="scheduled">Scheduled</option>
<option value="completed">Completed</option>
</select>
<select class="h-10 rounded-lg bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-sm text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary w-40">
<option value="">유형: 전체</option>
<option value="report">보고서</option>
<option value="data">데이터</option>
<option value="system">시스템</option>
</select>
</div>
</div>
<!-- Job List -->
<div class="flex flex-col gap-3 px-4">
<!-- Job Item 1 -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700 transition-colors">
<div class="flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shrink-0 size-12">
<span class="material-symbols-outlined text-2xl">newspaper</span>
</div>
<div class="flex flex-1 flex-col justify-center min-w-0">
<p class="text-slate-900 dark:text-white text-base font-medium truncate mb-1">매일 뉴스 브리핑</p>
<div class="flex items-center gap-3 text-sm text-slate-500 dark:text-slate-400 font-mono">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">smart_toy</span> Agent: 뉴스 수집기</span>
<span class="text-slate-300 dark:text-slate-600">•</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> 매일 08:00</span>
</div>
</div>
<div class="shrink-0 flex items-center">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-cyan-100 text-cyan-800 dark:bg-cyan-900/30 dark:text-cyan-400 border border-cyan-200 dark:border-cyan-800/50">
                                    ACTIVE
                                </span>
</div>
</div>
<!-- Job Item 2 -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700 transition-colors">
<div class="flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shrink-0 size-12">
<span class="material-symbols-outlined text-2xl">description</span>
</div>
<div class="flex flex-1 flex-col justify-center min-w-0">
<p class="text-slate-900 dark:text-white text-base font-medium truncate mb-1">주간 보고서</p>
<div class="flex items-center gap-3 text-sm text-slate-500 dark:text-slate-400 font-mono">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">smart_toy</span> Agent: 데이터 분석가</span>
<span class="text-slate-300 dark:text-slate-600">•</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> 매주 금요일 17:00</span>
</div>
</div>
<div class="shrink-0 flex items-center">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400 border border-amber-200 dark:border-amber-800/50">
                                    SCHEDULED
                                </span>
</div>
</div>
<!-- Job Item 3 -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700 transition-colors">
<div class="flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 shrink-0 size-12">
<span class="material-symbols-outlined text-2xl">database</span>
</div>
<div class="flex flex-1 flex-col justify-center min-w-0">
<p class="text-slate-900 dark:text-white text-base font-medium truncate mb-1">데이터 백업</p>
<div class="flex items-center gap-3 text-sm text-slate-500 dark:text-slate-400 font-mono">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">smart_toy</span> Agent: 시스템 관리자</span>
<span class="text-slate-300 dark:text-slate-600">•</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> 매일 02:00</span>
</div>
</div>
<div class="shrink-0 flex items-center">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800/50">
                                    COMPLETED
                                </span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
