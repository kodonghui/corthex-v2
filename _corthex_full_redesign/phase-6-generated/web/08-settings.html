<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX System Settings Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden" style="--select-button-svg: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(148, 163, 184)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z%27%3e%3c/path%3e%3c/svg%3e');">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 sm:px-10 md:px-20 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[800px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-4 sm:px-10 py-4">
<div class="flex items-center gap-4">
<div class="w-6 h-6 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">settings</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">CORTHEX System Settings</h2>
</div>
</header>
<div class="pb-3 pt-2">
<div class="flex border-b border-slate-200 dark:border-slate-800 px-4 sm:px-10 gap-8">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary pb-3 pt-4" href="#">
<p class="text-primary text-sm font-bold leading-normal">일반</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 pb-3 pt-4 transition-colors" href="#">
<p class="text-sm font-bold leading-normal">테마</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 pb-3 pt-4 transition-colors" href="#">
<p class="text-sm font-bold leading-normal">알림 설정</p>
</a>
</div>
</div>
<div class="px-4 sm:px-10 py-6 flex flex-col gap-10">
<!-- 회사 정보 Section -->
<section>
<h2 class="text-[22px] font-bold leading-tight tracking-tight pb-6">회사 정보</h2>
<div class="flex flex-col gap-5">
<div class="flex flex-col gap-4">
<label class="flex flex-col flex-1">
<p class="text-base font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">회사 이름</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal transition-all" value="CORTHEX Inc."/>
</label>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
<label class="flex flex-col flex-1">
<p class="text-base font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">언어</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 bg-[image:--select-button-svg] bg-[length:24px_24px] bg-[position:right_15px_center] bg-no-repeat appearance-none placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal transition-all">
<option value="ko">한국어 (Korean)</option>
<option value="en">English</option>
<option value="ja">日本語 (Japanese)</option>
</select>
</label>
<label class="flex flex-col flex-1">
<p class="text-base font-medium leading-normal pb-2 text-slate-700 dark:text-slate-300">표준 시간대</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 h-14 bg-[image:--select-button-svg] bg-[length:24px_24px] bg-[position:right_15px_center] bg-no-repeat appearance-none placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal transition-all">
<option value="asia-seoul">(UTC+09:00) Seoul</option>
<option value="utc">(UTC+00:00) UTC</option>
<option value="america-ny">(UTC-05:00) Eastern Time</option>
</select>
</label>
</div>
</div>
</section>
<div class="w-full h-px bg-slate-200 dark:bg-slate-800"></div>
<!-- 테마 Section -->
<section>
<h2 class="text-[22px] font-bold leading-tight tracking-tight pb-6">테마</h2>
<div class="flex flex-col gap-4">
<p class="text-base font-medium leading-normal text-slate-700 dark:text-slate-300">액센트 컬러</p>
<div class="flex items-center gap-4 flex-wrap">
<button class="w-12 h-12 rounded-full bg-cyan-400 flex items-center justify-center ring-2 ring-cyan-400 ring-offset-2 dark:ring-offset-background-dark transition-all cursor-pointer">
<span class="material-symbols-outlined text-white text-xl">check</span>
</button>
<button class="w-12 h-12 rounded-full bg-amber-400 hover:scale-110 transition-transform cursor-pointer"></button>
<button class="w-12 h-12 rounded-full bg-emerald-400 hover:scale-110 transition-transform cursor-pointer"></button>
<button class="w-12 h-12 rounded-full bg-violet-400 hover:scale-110 transition-transform cursor-pointer"></button>
<button class="w-12 h-12 rounded-full bg-slate-400 hover:scale-110 transition-transform cursor-pointer"></button>
<span class="ml-2 text-sm font-medium text-slate-500 dark:text-slate-400">Cyan (기본값)</span>
</div>
</div>
</section>
<div class="w-full h-px bg-slate-200 dark:bg-slate-800"></div>
<!-- 알림 설정 Section -->
<section>
<h2 class="text-[22px] font-bold leading-tight tracking-tight pb-6">알림 설정</h2>
<div class="flex flex-col gap-6">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<p class="text-base font-medium text-slate-900 dark:text-slate-100">시스템 업데이트 알림</p>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">새로운 기능 및 중요 시스템 업데이트에 대한 알림을 받습니다.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between">
<div class="flex flex-col">
<p class="text-base font-medium text-slate-900 dark:text-slate-100">보안 경고</p>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">비정상적인 로그인 시도 또는 보안 관련 중요 경고를 수신합니다.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between">
<div class="flex flex-col">
<p class="text-base font-medium text-slate-900 dark:text-slate-100">마케팅 이메일 수신</p>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">서비스 관련 프로모션 및 뉴스레터를 이메일로 받습니다.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<div class="pt-8 pb-10 flex justify-end gap-4 mt-auto">
<button class="px-6 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                취소
                            </button>
<button class="px-6 py-2.5 rounded-lg bg-primary text-background-dark font-semibold hover:bg-primary/90 transition-colors shadow-sm">
                                저장
                            </button>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
