<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX Mobile Jobs Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20d3ee",
                        "background-light": "#f6f8f8",
                        "background-dark": "#020617", // slate-950
                        "card-dark": "#0f172a", // slate-900
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary/30">
<!-- Header -->
<header class="flex items-center justify-between px-4 h-14 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="w-11 h-11 flex items-center justify-start">
<!-- Placeholder for back button if needed, keeping layout balanced -->
</div>
<h1 class="text-lg font-semibold tracking-tight">Jobs</h1>
<button aria-label="Filter Jobs" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">tune</span>
</button>
</header>
<!-- Segment Control -->
<div class="px-4 py-3 sticky top-14 z-10 bg-background-light dark:bg-background-dark">
<div class="flex h-10 w-full items-center justify-between rounded-lg bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex-1 h-full cursor-pointer rounded-md has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium transition-all relative">
<input checked="" class="peer sr-only" name="job-status" type="radio" value="활성"/>
<span class="flex items-center justify-center h-full w-full">활성</span>
</label>
<label class="flex-1 h-full cursor-pointer rounded-md has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium transition-all relative">
<input class="peer sr-only" name="job-status" type="radio" value="예정"/>
<span class="flex items-center justify-center h-full w-full">예정</span>
</label>
<label class="flex-1 h-full cursor-pointer rounded-md has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium transition-all relative">
<input class="peer sr-only" name="job-status" type="radio" value="완료"/>
<span class="flex items-center justify-center h-full w-full">완료</span>
</label>
<label class="flex-1 h-full cursor-pointer rounded-md has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-slate-900 dark:has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium transition-all relative">
<input class="peer sr-only" name="job-status" type="radio" value="실패"/>
<span class="flex items-center justify-center h-full w-full">실패</span>
</label>
</div>
</div>
<!-- Main Content List -->
<main class="flex-1 overflow-y-auto px-4 pb-24 space-y-4">
<!-- Job Card 1 (Active) -->
<article class="bg-white dark:bg-card-dark rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col gap-3">
<div class="flex items-start justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px] text-primary">schedule</span>
<h2 class="text-base font-semibold text-slate-900 dark:text-white leading-tight">매일 뉴스 브리핑</h2>
</div>
<span class="inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">ACTIVE</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[16px]">smart_toy</span>
<span>News Agent</span>
</div>
</div>
<div class="mt-2 pt-3 border-t border-slate-100 dark:border-slate-800/50 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">NEXT RUN</span>
<span class="font-mono text-xs text-slate-700 dark:text-slate-300">08:00 AM KST</span>
</div>
<button aria-label="Job options" class="w-8 h-8 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">more_horiz</span>
</button>
</div>
</article>
<!-- Job Card 2 (Active) -->
<article class="bg-white dark:bg-card-dark rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col gap-3">
<div class="flex items-start justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px] text-primary animate-pulse">sync</span>
<h2 class="text-base font-semibold text-slate-900 dark:text-white leading-tight">실시간 시장 데이터 동기화</h2>
</div>
<span class="inline-flex items-center rounded-full bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">ACTIVE</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[16px]">smart_toy</span>
<span>Finance Bot Alpha</span>
</div>
</div>
<div class="mt-2 pt-3 border-t border-slate-100 dark:border-slate-800/50 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">INTERVAL</span>
<span class="font-mono text-xs text-slate-700 dark:text-slate-300">Every 15m</span>
</div>
<div class="flex gap-2">
<button aria-label="Stop job" class="w-8 h-8 rounded-full flex items-center justify-center bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">
<span class="material-symbols-outlined text-[18px]">stop</span>
</button>
<button aria-label="Job options" class="w-8 h-8 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">more_horiz</span>
</button>
</div>
</div>
</article>
<!-- Job Card 3 (Scheduled) -->
<article class="bg-white dark:bg-card-dark rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col gap-3 opacity-80">
<div class="flex items-start justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px] text-amber-500">event</span>
<h2 class="text-base font-semibold text-slate-900 dark:text-white leading-tight">주간 데이터 분석</h2>
</div>
<span class="inline-flex items-center rounded-full bg-amber-100 dark:bg-amber-400/10 px-2 py-0.5 text-xs font-medium text-amber-700 dark:text-amber-400 ring-1 ring-inset ring-amber-500/20">SCHEDULED</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[16px]">smart_toy</span>
<span>Data Analyst Agent</span>
</div>
</div>
<div class="mt-2 pt-3 border-t border-slate-100 dark:border-slate-800/50 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">PLANNED START</span>
<span class="font-mono text-xs text-slate-700 dark:text-slate-300">FRIDAY 18:00</span>
</div>
<button aria-label="Job options" class="w-8 h-8 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">more_horiz</span>
</button>
</div>
</article>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-lg px-4 pb-safe pt-2 z-50">
<div class="flex h-14 justify-between max-w-md mx-auto">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">home</span>
<span class="text-[10px] font-medium tracking-wide">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">robot_2</span>
<span class="text-[10px] font-medium tracking-wide">Agents</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">work</span>
<span class="text-[10px] font-medium tracking-wide">Jobs</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">settings</span>
<span class="text-[10px] font-medium tracking-wide">Settings</span>
</a>
</div>
<!-- Safe area spacing for iOS home indicator -->
<div class="h-6 w-full"></div>
</nav>
</body></html>
