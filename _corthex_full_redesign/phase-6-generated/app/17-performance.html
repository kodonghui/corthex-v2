<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CORTHEX Mobile Performance Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1dd4ed",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102022",
                    },
                    fontFamily: {
                        "display": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex justify-center">
<div class="relative flex min-h-screen w-full max-w-[430px] flex-col overflow-x-hidden bg-background-dark pb-[80px]">
<!-- Header -->
<div class="sticky top-0 z-10 flex items-center justify-between bg-background-dark/95 backdrop-blur-md p-4 pb-2 border-b border-primary/10">
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pl-12">성과</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex h-12 w-12 cursor-pointer items-center justify-center rounded-xl bg-transparent text-slate-100 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">calendar_today</span>
</button>
</div>
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
<!-- Overall Score Card -->
<div class="flex items-center justify-between rounded-xl bg-primary/5 border border-primary/10 p-6 shadow-sm">
<div class="flex flex-col gap-2">
<p class="text-slate-300 text-base font-bold leading-tight">Overall Score</p>
<p class="text-primary text-3xl font-mono font-bold leading-normal">87점</p>
</div>
<div class="relative flex h-[80px] w-[80px] items-center justify-center rounded-full bg-background-dark shadow-[inset_0_0_10px_rgba(29,212,237,0.1)]">
<svg class="absolute h-full w-full rotate-[-90deg]" viewbox="0 0 100 100">
<circle class="stroke-primary/20" cx="50" cy="50" fill="transparent" r="45" stroke-width="8"></circle>
<circle class="stroke-primary" cx="50" cy="50" fill="transparent" r="45" stroke-dasharray="282.7" stroke-dashoffset="36.75" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<span class="text-slate-100 font-mono font-bold text-lg z-10">87%</span>
</div>
</div>
<!-- Metrics Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2 rounded-xl p-5 bg-primary/5 border border-primary/10">
<p class="text-slate-400 text-sm font-medium leading-normal">Response Time</p>
<p class="text-slate-100 font-mono text-xl font-bold leading-tight">2.3s</p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-5 bg-primary/5 border border-primary/10">
<p class="text-slate-400 text-sm font-medium leading-normal">Success Rate</p>
<p class="text-slate-100 font-mono text-xl font-bold leading-tight">94%</p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-5 bg-primary/5 border border-primary/10">
<p class="text-slate-400 text-sm font-medium leading-normal">Throughput</p>
<p class="text-slate-100 font-mono text-xl font-bold leading-tight">156 <span class="text-xs font-display text-slate-400 font-normal">tasks/day</span></p>
</div>
<div class="flex flex-col gap-2 rounded-xl p-5 bg-primary/5 border border-primary/10">
<p class="text-slate-400 text-sm font-medium leading-normal">Satisfaction</p>
<p class="text-slate-100 font-mono text-xl font-bold leading-tight">4.2<span class="text-xs font-display text-slate-400 font-normal">/5 stars</span></p>
</div>
</div>
<!-- Agent Ranking -->
<div>
<h3 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] pb-4">Agent Ranking</h3>
<div class="flex flex-col gap-3">
<!-- Rank 1 -->
<div class="flex items-center gap-4 rounded-xl bg-primary/10 p-4 border border-primary/20">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-yellow-500/20 text-yellow-500 font-bold">1</div>
<div class="flex-1">
<div class="flex justify-between mb-1">
<span class="text-slate-100 font-medium text-sm">Alpha-Core</span>
<span class="text-primary font-mono text-sm">98%</span>
</div>
<div class="h-1.5 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 98%"></div>
</div>
</div>
</div>
<!-- Rank 2 -->
<div class="flex items-center gap-4 rounded-xl bg-primary/5 p-4 border border-primary/10">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-300/20 text-slate-300 font-bold">2</div>
<div class="flex-1">
<div class="flex justify-between mb-1">
<span class="text-slate-100 font-medium text-sm">Nexus-07</span>
<span class="text-primary font-mono text-sm">92%</span>
</div>
<div class="h-1.5 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full bg-primary/80 rounded-full" style="width: 92%"></div>
</div>
</div>
</div>
<!-- Rank 3 -->
<div class="flex items-center gap-4 rounded-xl bg-primary/5 p-4 border border-primary/10">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-orange-400/20 text-orange-400 font-bold">3</div>
<div class="flex-1">
<div class="flex justify-between mb-1">
<span class="text-slate-100 font-medium text-sm">DataWeave</span>
<span class="text-primary font-mono text-sm">88%</span>
</div>
<div class="h-1.5 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full bg-primary/60 rounded-full" style="width: 88%"></div>
</div>
</div>
</div>
<!-- Rank 4 -->
<div class="flex items-center gap-4 rounded-xl bg-transparent p-4 border border-transparent">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-700 text-slate-400 font-bold text-sm">4</div>
<div class="flex-1">
<div class="flex justify-between mb-1">
<span class="text-slate-300 font-medium text-sm">Synth-Bot</span>
<span class="text-slate-400 font-mono text-sm">81%</span>
</div>
<div class="h-1.5 w-full rounded-full bg-slate-800 overflow-hidden">
<div class="h-full bg-slate-500 rounded-full" style="width: 81%"></div>
</div>
</div>
</div>
<!-- Rank 5 -->
<div class="flex items-center gap-4 rounded-xl bg-transparent p-4 border border-transparent">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-700 text-slate-400 font-bold text-sm">5</div>
<div class="flex-1">
<div class="flex justify-between mb-1">
<span class="text-slate-300 font-medium text-sm">Logic-Node</span>
<span class="text-slate-400 font-mono text-sm">76%</span>
</div>
<div class="h-1.5 w-full rounded-full bg-slate-800 overflow-hidden">
<div class="h-full bg-slate-500 rounded-full" style="width: 76%"></div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 w-full max-w-[430px] flex gap-2 border-t border-primary/10 bg-background-dark/95 backdrop-blur-md px-4 pb-safe pt-2 z-20" style="padding-bottom: env(safe-area-inset-bottom, 12px);">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">home</span>
</div>
<p class="text-[10px] font-medium leading-normal">Dashboard</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">smart_toy</span>
</div>
<p class="text-[10px] font-medium leading-normal">Agents</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center relative">
<div class="absolute inset-0 bg-primary/20 blur-md rounded-full"></div>
<span class="material-symbols-outlined text-[24px] relative z-10" style="font-variation-settings: 'FILL' 1;">monitoring</span>
</div>
<p class="text-[10px] font-medium leading-normal">Performance</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">settings</span>
</div>
<p class="text-[10px] font-medium leading-normal">Settings</p>
</a>
</div>
</div>
</body></html>
